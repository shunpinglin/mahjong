[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_pgsql",
  "php82Extensions.pgsql",
  "php82Extensions.mbstring",
  "php82Extensions.openssl",
  "php82Extensions.curl",
  "php82Packages.composer"
]

[phases.build]
cmds = ["composer install --no-dev"]

[start]
cmd = "php -S 0.0.0.0:80 api.php"
